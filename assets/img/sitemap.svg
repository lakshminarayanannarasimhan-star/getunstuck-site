  .dash  { stroke: #9E5A34; stroke-opacity: 0.4; fill: none; stroke-width: 1; stroke-dasharray: 4 4; }
  .display { font-family: 'Playfair Display', serif; }
  .mono    { font-family: 'DM Mono', monospace; letter-spacing: 0.1em; }
  .sans    { font-family: 'DM Sans', sans-serif; }
]]></style>
</defs>

