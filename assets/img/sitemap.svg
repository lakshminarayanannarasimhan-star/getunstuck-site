<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 820" role="img" aria-label="Pictorial sitemap of getunstuck.in">
<defs>
<style><![CDATA[
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=DM+Sans:wght@400;500&family=DM+Mono:wght@400&display=swap');
  .bg    { fill: #F3EDE2; }
  .root  { fill: #211C16; }
  .card  { fill: #F8F4EC; stroke: #211C16; stroke-opacity: 0.16; stroke-width: 1; }
