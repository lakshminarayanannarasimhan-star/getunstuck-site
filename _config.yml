# =========================================
# GET UNSTUCK — SITE CONFIGURATION
# Leadership Handbooks · getunstuck.in
# =========================================

# -------------------------
# BASIC SITE INFO
# -------------------------

title: Get Unstuck
tagline: "You were never broken. You were stuck."
description: "A practitioner library for leaders. The practice materials are yours to use. No email gate."
author: Lakshmi Narayanan

# -------------------------
# THEME
# -------------------------
# Change one line — every page follows.
# Uncomment the theme you want, comment out the rest.
#
# ── SIGNATURE THEMES (full surface + gradient system) ──────────────
#
# unstuck_theme: dojo            # Warm paper, ochre gradient       · DEFAULT
# unstuck_theme: midnight      # Deep dark, indigo glow
# unstuck_theme: forest        # Deep green, earthy, grounded
# unstuck_theme: sunset        # Warm amber to rose, editorial
# unstuck_theme: slate         # Cool white, steel blue, executive
# unstuck_theme: mono          # Stripped back, pure black/white
#
# ── DARK THEMES ────────────────────────────────────────────────────
#
# unstuck_theme: obsidian      # Gunmetal black, warm amber accent
# unstuck_theme: navy          # Deep admiralty navy, antique gold
# unstuck_theme: plum          # Deep aubergine, electric fuchsia
# unstuck_theme: charcoal      # Warm graphite, emerald accent
# unstuck_theme: midnight      # Deep ink, electric indigo (see above)
#
# ── LIGHT THEMES ───────────────────────────────────────────────────
#
# unstuck_theme: ivory         # Warm white, barely-there surfaces
# unstuck_theme: linen         # Warm cream, terracotta, editorial
# unstuck_theme: chalk         # Bright white, graphite, zero colour
# unstuck_theme: cloud         # Cool white, soft lavender accent
#
# ── BOLD / VIVID THEMES ────────────────────────────────────────────
#
# unstuck_theme: saffron       # Deep burnt orange, firelike warmth
# unstuck_theme: cobalt        # Deep sapphire, antique gold accent
# unstuck_theme: jade          # Deep teal, gold accent
# unstuck_theme: crimson       # Deep burgundy, antique gold accent
#
# ── EDITORIAL / PRINT THEMES ───────────────────────────────────────
#
# unstuck_theme: broadsheet    # Newspaper grey, classic editorial
# unstuck_theme: manuscript    # Aged parchment, sepia, scholarly
# unstuck_theme: blueprint     # Technical navy, precision sky-blue
# unstuck_theme: noir          # Cinematic near-black, sepia gold
#
# ── NATURE THEMES ──────────────────────────────────────────────────
#
unstuck_theme: ocean         # Deep abyssal blue, bioluminescent teal
# unstuck_theme: sand          # Warm beige, sun-bleached minimal
# unstuck_theme: ember         # Dark brown, glowing amber, firelight
# unstuck_theme: arctic        # Ice white, steel blue, cold and clean
#
# ── ACCENT-SWAP THEMES (dojo base + colour accent) ─────────────────
# These inherit the warm paper surface — only the accent colour changes.
# unstuck_theme: indigo        # Indigo accent
# unstuck_theme: emerald       # Emerald accent
# unstuck_theme: amber         # Amber accent
# unstuck_theme: rose          # Rose accent
# unstuck_theme: cyan          # Cyan accent
# unstuck_theme: violet        # Violet accent
# unstuck_theme: oasis         # Muted purple accent
# unstuck_theme: berry         # Berry accent
# unstuck_theme: delight       # Bright red accent
# unstuck_theme: summer_sunset # Deep rose accent
# unstuck_theme: adventure     # Sky blue accent
# unstuck_theme: feast         # Vivid green accent
# unstuck_theme: ocean_breeze  # Bold rose-red accent
# unstuck_theme: pumpkin_spice # Warm orange accent
# unstuck_theme: evergreen     # Forest green accent

typography: spacious   # executive | compact | spacious

# -------------------------
# DOMAIN
# -------------------------

url: "https://getunstuck.in"
baseurl: ""

# -------------------------
# COLLECTIONS
# -------------------------

collections:
  drills:
    output: true
    permalink: /drills/:name/
  articles:
    output: true
    permalink: /writing/:name/
  mentees:
    output: false

# -------------------------
# DEFAULTS
# -------------------------

defaults:
  - scope:
      path: ""
      type: "drills"
    values:
      layout: "drill"
  - scope:
      path: ""
      type: "articles"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

# -------------------------
# MARKDOWN
# -------------------------

markdown: kramdown
highlighter: rouge

# -------------------------
# BUILD
# -------------------------

exclude:
  - README.md
  - CLAUDE.md
  - Gemfile.lock
  - node_modules
  - vendor

# =========================================
# NOTES
# =========================================
# 1. Custom domain → baseurl must be ""
# 2. CNAME file must contain: getunstuck.in
# 3. DNS: four A records pointing to GitHub Pages IPs
#    185.199.108.153 / .109 / .110 / .111
# 4. Drills live in /_drills/ as .md files
# 5. Articles live in /_articles/ as .md files
# 6. Posts (writings) live in /_posts/ as YYYY-MM-DD-title.md
# =========================================
