# =========================================
# GET UNSTUCK — SITE CONFIGURATION
# Leadership Handbooks · getunstuck.in
# =========================================

# -------------------------
# BASIC SITE INFO
# -------------------------

title: Get Unstuck
tagline: "You were never broken. You were stuck."
description: "A practitioner library for leaders. The practice materials are yours to use. No email gate."
author: Lakshmi Narayanan

# -------------------------
# THEME
# -------------------------
# Change one line — every page follows.
# Uncomment the theme you want, comment out the rest.
#
# ── GRADIENT THEMES ────────────────────────────────────────────────
#
# unstuck_theme: sunrise       # Warm white, pale yellow → coral-red
# unstuck_theme: aurora        # White, coral → purple
# unstuck_theme: flamingo      # White, coral → deep magenta
# unstuck_theme: sovereign     # White, olive → electric blue (WIP)
#
# ── SIGNATURE ──────────────────────────────────────────────────────
#
# unstuck_theme: dojo          # Warm paper, ochre · DEFAULT
# unstuck_theme: mono          # Pure black/white, zero colour
# unstuck_theme: sunset        # Warm amber to rose, editorial
# unstuck_theme: slate         # Cool white, steel blue, executive
#
# ── DARK ───────────────────────────────────────────────────────────
#
# unstuck_theme: midnight      # Deep ink, electric indigo
# unstuck_theme: navy          # Deep admiralty navy, antique gold
# unstuck_theme: plum          # Deep aubergine, electric fuchsia
# unstuck_theme: charcoal      # Warm graphite, emerald accent
# unstuck_theme: forest        # Deep green, earthy, grounded
#
# ── LIGHT ──────────────────────────────────────────────────────────
#
# unstuck_theme: ivory         # Warm white, barely-there surfaces
# unstuck_theme: chalk         # Bright white, graphite, zero colour
# unstuck_theme: cloud         # Cool white, soft lavender accent
# unstuck_theme: sky           # Light blue canvas, deep cobalt
# unstuck_theme: rainbow       # Light lavender, deep violet
#
# ── EDITORIAL / PRINT ──────────────────────────────────────────────
#
# unstuck_theme: blueprint     # Technical navy, precision sky-blue
# unstuck_theme: noir          # Cinematic near-black, sepia gold
# unstuck_theme: arctic        # Ice white, steel blue, cold and clean
#
# ── ACCENT-SWAP (dojo base + colour accent) ────────────────────────
#
# unstuck_theme: indigo        # Indigo accent
# unstuck_theme: emerald       # Emerald accent
# unstuck_theme: oasis         # Muted purple accent
# unstuck_theme: delight       # Bright red accent
# unstuck_theme: ocean_breeze  # Bold rose-red accent
unstuck_theme: evergreen     # Forest green accent

typography: spacious   # executive | compact | spacious

enable_audio: true     # set to false to hide the audio player on all articles

# -------------------------
# DOMAIN
# -------------------------

url: "https://getunstuck.in"
baseurl: ""

# Paste the verification code from Google Search Console (Settings → Ownership verification → HTML tag)
google_site_verification: "O5u7zPWSihGkf0z5rDzsQ81HcbdCcLYyuovnbZiOEzI"

# -------------------------
# COLLECTIONS
# -------------------------

collections:
  drills:
    output: true
    permalink: /drills/:name/
  workbooks:
    output: false
  case_studies:
    output: false
  mentees:
    output: false

# -------------------------
# DEFAULTS
# -------------------------

defaults:
  - scope:
      path: ""
      type: "drills"
    values:
      layout: "drill"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

# -------------------------
# MARKDOWN
# -------------------------

permalink: pretty

markdown: kramdown
highlighter: rouge

plugins:
  - jekyll-feed
  - jekyll-sitemap

# -------------------------
# BUILD
# -------------------------

exclude:
  - README.md
  - CLAUDE.md
  - TODO.md
  - Gemfile.lock
  - node_modules
  - vendor
  - examples
  - pages/the-invisible-backlog.md
  - pages/the-series.md

# =========================================
# NOTES
# =========================================
# 1. Custom domain → baseurl must be ""
# 2. CNAME file must contain: getunstuck.in
# 3. DNS: four A records pointing to GitHub Pages IPs
#    185.199.108.153 / .109 / .110 / .111
# 4. Drills live in /_drills/ as .md files
# 5. Articles live in /_articles/ as .md files
# 6. Posts (writings) live in /_posts/ as YYYY-MM-DD-title.md
# =========================================
