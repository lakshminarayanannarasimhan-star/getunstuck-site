---
layout: default
---
<article class="post-article">

  <div class="eyebrow">{{ page.category }}</div>
  <h1>{{ page.title }}</h1>
  <div class="post-meta">
    {{ page.date | date: "%d %B %Y" }}
    {% if page.tags %} · {{ page.tags | join: " · " }}{% endif %}
  </div>

  {{ content }}

  <div class="drill-nav" style="margin-top:3rem;">
    <a class="btn-ghost" href="/writing/">← All Writing</a>
  </div>

</article>
