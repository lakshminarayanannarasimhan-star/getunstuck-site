name: Publish H2 — The Trust Ceiling

# 16 Jun 2026 00:01 IST = 15 Jun 2026 18:31 UTC
on:
  schedule:
    - cron: '31 18 15 6 *'
  workflow_dispatch: # allow manual trigger to test

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Empty commit to trigger GitHub Pages rebuild
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: scheduled rebuild — publish H2 The Trust Ceiling"
          git push
