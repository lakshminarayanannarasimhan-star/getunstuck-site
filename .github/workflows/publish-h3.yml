name: Publish H3 — The Indispensability Gap

# 19 Jun 2026 21:00 IST = 19 Jun 2026 15:30 UTC
on:
  schedule:
    - cron: '30 15 19 6 *'
  workflow_dispatch: # allow manual trigger to test

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Empty commit to trigger GitHub Pages rebuild
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: scheduled rebuild — publish H3 The Indispensability Gap"
          git push
